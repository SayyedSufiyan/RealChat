{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Mobile Responsive Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Responsive Login</title>

    <style>

        /* =========================
           RESET CSS
        ========================== */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        /* =========================
           BODY STYLING
        ========================== */
        body{

            font-family:'Segoe UI', sans-serif;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:20px;

            background:linear-gradient(135deg,#304ffe,#ff4081);

            position:relative;

            overflow:hidden;
        }

        /* =========================
           BACKGROUND EFFECT
        ========================== */
        body::before{

            content:"";

            position:absolute;

            inset:0;

            background-image:
            radial-gradient(circle at top left,
            rgba(255,255,255,0.10),
            transparent 35%),

            radial-gradient(circle at bottom right,
            rgba(255,255,255,0.10),
            transparent 35%);

            z-index:0;
        }

        /* =========================
           LOGIN CONTAINER
        ========================== */
        .login-container{

            position:relative;

            z-index:1;

            width:100%;

            max-width:430px;

            padding:40px 28px;

            border-radius:22px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(14px);

            box-shadow:
            0 8px 30px rgba(0,0,0,0.2);

            color:white;
        }

        /* =========================
           HEADING
        ========================== */
        .login-container h2{

            text-align:center;

            margin-bottom:30px;

            font-size:2rem;

            font-weight:700;
        }

        /* =========================
           LABELS
        ========================== */
        .login-container label{

            display:block;

            margin-bottom:8px;

            margin-top:16px;

            font-size:14px;

            font-weight:500;
        }

        /* =========================
           INPUT FIELDS
        ========================== */
        .login-container input[type="text"],
        .login-container input[type="password"]{

            width:100%;

            padding:15px 16px;

            border:none;

            outline:none;

            border-radius:14px;

            background:rgba(255,255,255,0.20);

            color:white;

            font-size:16px;

            transition:0.3s ease;
        }

        /* Placeholder Color */
        .login-container input::placeholder{

            color:#f1f1f1;
        }

        /* Input Focus Effect */
        .login-container input:focus{

            background:rgba(255,255,255,0.28);

            box-shadow:
            0 0 0 3px rgba(255,255,255,0.12);
        }

        /* =========================
           BUTTON
        ========================== */
        .login-container button{

            width:100%;

            padding:15px;

            margin-top:28px;

            border:none;

            border-radius:14px;

            background:white;

            color:#304ffe;

            font-size:16px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s ease;
        }

        /* Hover Effect */
        .login-container button:hover{

            transform:translateY(-2px);

            background:#f3f3f3;
        }

        /* =========================
           ERROR LIST
        ========================== */
        .errorlist{

            margin-top:6px;

            color:#ffd5d5;

            font-size:13px;
        }

        /* =========================
           REGISTER LINK
        ========================== */
        .register-link{

            text-align:center;

            margin-top:24px;

            font-size:15px;
        }

        .register-link a{

            color:white;

            text-decoration:none;

            font-weight:bold;
        }

        .register-link a:hover{

            text-decoration:underline;
        }

        /* =========================
           TABLET RESPONSIVE
        ========================== */
        @media screen and (max-width:768px){

            .login-container{

                padding:35px 24px;
            }

            .login-container h2{

                font-size:1.8rem;
            }

        }

        /* =========================
           MOBILE RESPONSIVE
        ========================== */
        @media screen and (max-width:480px){

            body{

                padding:18px;
            }

            .login-container{

                width:100%;

                max-width:100%;

                padding:35px 22px;

                border-radius:18px;
            }

            .login-container h2{

                font-size:28px;

                margin-bottom:25px;
            }

            .login-container label{

                font-size:14px;
            }

            .login-container input{

                padding:16px;

                font-size:16px;
            }

            .login-container button{

                padding:16px;

                font-size:17px;
            }

            .register-link{

                font-size:14px;
            }
        }

    </style>

</head>

<body>

    <!-- =========================
         LOGIN CARD
    ========================== -->
    <div class="login-container">

        <h2>Login</h2>

        <!-- Login Form -->
        <form method="POST">

            {% csrf_token %}

            {% for field in form %}

                <!-- Label -->
                <label for="{{ field.id_for_label }}">
                    {{ field.label }}
                </label>

                <!-- Input -->
                {{ field }}

                <!-- Error Messages -->
                {% for error in field.errors %}

                    <div class="errorlist">
                        {{ error }}
                    </div>

                {% endfor %}

            {% endfor %}

            <!-- Login Button -->
            <button type="submit">
                Login
            </button>

        </form>

        <!-- Register Link -->
        <div class="register-link">

            Don't have an account?

            <a href="{% url 'register' %}">
                Register here
            </a>

        </div>

    </div>

</body>
</html>
