{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Responsive Login</title>

    <style>

        /* =========================
           RESET
        ========================== */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        /* =========================
           BODY
        ========================== */
        body{

            font-family:'Segoe UI', sans-serif;

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:20px;

            background:linear-gradient(135deg,#304ffe,#ff4081);

            position:relative;

            overflow:hidden;
        }

        /* =========================
           BACKGROUND EFFECT
        ========================== */
        body::before{

            content:"";

            position:absolute;

            width:100%;
            height:100%;

            background-image:
            radial-gradient(circle at top left,
            rgba(255,255,255,0.08),
            transparent 40%),

            radial-gradient(circle at bottom right,
            rgba(255,255,255,0.08),
            transparent 40%);

            z-index:0;
        }

        /* =========================
           LOGIN CONTAINER
        ========================== */
        .login-container{

            position:relative;

            z-index:1;

            width:100%;

            max-width:430px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(14px);

            border-radius:22px;

            padding:40px 30px;

            box-shadow:0 10px 35px rgba(0,0,0,0.25);

            color:white;
        }

        /* =========================
           TITLE
        ========================== */
        .login-container h2{

            text-align:center;

            margin-bottom:30px;

            font-size:32px;

            font-weight:700;
        }

        /* =========================
           LABELS
        ========================== */
        .login-container label{

            display:block;

            margin-top:15px;
            margin-bottom:8px;

            font-size:14px;

            font-weight:500;
        }

        /* =========================
           INPUTS
        ========================== */
        .login-container input[type="text"],
        .login-container input[type="password"]{

            width:100%;

            padding:15px;

            border:none;

            outline:none;

            border-radius:14px;

            background:rgba(255,255,255,0.18);

            color:white;

            font-size:16px;

            transition:0.3s ease;
        }

        /* Placeholder */
        .login-container input::placeholder{

            color:#eeeeee;
        }

        /* Focus */
        .login-container input:focus{

            background:rgba(255,255,255,0.25);

            box-shadow:0 0 0 3px rgba(255,255,255,0.15);
        }

        /* =========================
           BUTTON
        ========================== */
        .login-container button{

            width:100%;

            margin-top:25px;

            padding:15px;

            border:none;

            border-radius:14px;

            background:white;

            color:#304ffe;

            font-size:17px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s ease;
        }

        /* Hover */
        .login-container button:hover{

            transform:translateY(-2px);

            background:#f1f1f1;
        }

        /* =========================
           ERROR TEXT
        ========================== */
        .errorlist{

            color:#ffd4d4;

            margin-top:6px;

            margin-left:3px;

            font-size:13px;
        }

        /* =========================
           REGISTER LINK
        ========================== */
        .register-link{

            text-align:center;

            margin-top:22px;

            font-size:15px;
        }

        .register-link a{

            color:white;

            font-weight:bold;

            text-decoration:none;
        }

        .register-link a:hover{

            text-decoration:underline;
        }

        /* =========================
           TABLET RESPONSIVE
        ========================== */
        @media (max-width:768px){

            .login-container{

                max-width:500px;

                padding:35px 28px;
            }

            .login-container h2{

                font-size:30px;
            }
        }

        /* =========================
           MOBILE RESPONSIVE
        ========================== */
        @media (max-width:480px){

            body{

                padding:18px;
            }

            .login-container{

                max-width:100%;

                padding:35px 22px;

                border-radius:18px;
            }

            .login-container h2{

                font-size:28px;

                margin-bottom:24px;
            }

            .login-container label{

                font-size:14px;
            }

            .login-container input{

                padding:16px;

                font-size:16px;
            }

            .login-container button{

                padding:16px;

                font-size:16px;
            }

            .register-link{

                font-size:14px;
            }
        }

    </style>

</head>

<body>

    <!-- =========================
         LOGIN BOX
    ========================== -->
    <div class="login-container">

        <h2>Login</h2>

        <form method="POST">

            {% csrf_token %}

            {% for field in form %}

                <!-- Label -->
                <label for="{{ field.id_for_label }}">
                    {{ field.label }}
                </label>

                <!-- Input -->
                {{ field }}

                <!-- Errors -->
                {% for error in field.errors %}

                    <div class="errorlist">
                        {{ error }}
                    </div>

                {% endfor %}

            {% endfor %}

            <!-- Button -->
            <button type="submit">
                Login
            </button>

        </form>

        <!-- Register -->
        <div class="register-link">

            Don't have an account?

            <a href="{% url 'register' %}">
                Register here
            </a>

        </div>

    </div>

</body>

</html>
