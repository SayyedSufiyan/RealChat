{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Responsive Register Page</title>

    <style>

        /* =========================
           GOOGLE FONT
        ========================== */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        /* =========================
           RESET CSS
        ========================== */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,
        body{
            width:100%;
            overflow-x:hidden;
        }

        /* =========================
           BODY
        ========================== */
        body{

            font-family:'Poppins', sans-serif;

            background:linear-gradient(135deg,#304ffe,#ff4081);

            position:relative;

            padding:20px;

            overflow-y:auto;

            -webkit-text-size-adjust:100%;
        }

        /* =========================
           BACKGROUND EFFECT
        ========================== */
        body::before{

            content:"";

            position:fixed;

            inset:0;

            background-image:
            radial-gradient(circle at top left,
            rgba(255,255,255,0.10),
            transparent 35%),

            radial-gradient(circle at bottom right,
            rgba(255,255,255,0.10),
            transparent 35%);

            z-index:0;
        }

        /* =========================
           PAGE WRAPPER
        ========================== */
        .page-wrapper{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:flex-start;

            padding:20px 0;

            position:relative;

            z-index:1;
        }

        /* =========================
           REGISTER CONTAINER
        ========================== */
        .register-container{

            width:100%;

            max-width:720px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(14px);

            border-radius:24px;

            padding:45px 35px;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.2);

            color:white;

            animation:fadeIn 0.5s ease;
        }

        /* =========================
           ANIMATION
        ========================== */
        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(10px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* =========================
           HEADING
        ========================== */
        .register-container h2{

            text-align:center;

            font-size:2.2rem;

            margin-bottom:35px;

            font-weight:600;
        }

        /* =========================
           FORM GRID
        ========================== */
        form{

            display:grid;

            grid-template-columns:1fr 1fr;

            gap:22px;
        }

        /* Full Width */
        .full-width{

            grid-column:1 / -1;
        }

        /* =========================
           LABEL
        ========================== */
        label{

            display:block;

            margin-bottom:8px;

            font-size:14px;

            font-weight:500;
        }

        /* =========================
           INPUTS
        ========================== */
        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="file"]{

            width:100%;

            padding:15px 16px;

            border:none;

            outline:none;

            border-radius:14px;

            background:rgba(255,255,255,0.20);

            color:white;

            font-size:16px;

            transition:0.3s ease;
        }

        /* Placeholder */
        input::placeholder{

            color:#eee;
        }

        /* Focus Effect */
        input:focus{

            background:rgba(255,255,255,0.28);

            box-shadow:
            0 0 0 3px rgba(255,255,255,0.12);
        }

        /* File Input */
        input[type="file"]{

            padding:12px;

            cursor:pointer;
        }

        /* =========================
           ERROR MESSAGE
        ========================== */
        .errorlist{

            margin-top:6px;

            color:#ffd0d0;

            font-size:13px;
        }

        /* =========================
           BUTTON
        ========================== */
        button{

            grid-column:1 / -1;

            width:100%;

            padding:16px;

            margin-top:10px;

            border:none;

            border-radius:14px;

            background:white;

            color:#304ffe;

            font-size:16px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s ease;
        }

        /* Hover */
        button:hover{

            transform:translateY(-2px);

            background:#f2f2f2;
        }

        /* =========================
           LOGIN LINK
        ========================== */
        .login-link{

            grid-column:1 / -1;

            text-align:center;

            margin-top:22px;

            font-size:15px;
        }

        .login-link a{

            color:white;

            font-weight:bold;

            text-decoration:none;
        }

        .login-link a:hover{

            text-decoration:underline;
        }

        /* =========================
           TABLET RESPONSIVE
        ========================== */
        @media screen and (max-width:768px){

            .register-container{

                padding:35px 25px;
            }

            form{

                gap:18px;
            }
        }

        /* =========================
           MOBILE RESPONSIVE
        ========================== */
        @media screen and (max-width:600px){

            body{

                padding:15px;
            }

            .page-wrapper{

                padding:10px 0 30px 0;
            }

            .register-container{

                width:100%;

                max-width:100%;

                padding:30px 20px;

                border-radius:18px;
            }

            .register-container h2{

                font-size:2rem;

                margin-bottom:25px;
            }

            form{

                grid-template-columns:1fr;

                gap:18px;
            }

            input{

                padding:16px;

                font-size:16px;
            }

            button{

                padding:16px;

                font-size:17px;
            }

            .login-link{

                font-size:14px;
            }
        }

    </style>

</head>

<body>

    <!-- =========================
         PAGE WRAPPER
    ========================== -->
    <div class="page-wrapper">

        <!-- =========================
             REGISTER CARD
        ========================== -->
        <div class="register-container">

            <h2>Register</h2>

            <!-- Register Form -->
            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                {% for field in form %}

                    <div class="{% if field.field.widget.input_type == 'file' %}full-width{% endif %}">

                        <!-- Label -->
                        <label for="{{ field.id_for_label }}">
                            {{ field.label }}
                        </label>

                        <!-- Input -->
                        <input
                            type="{{ field.field.widget.input_type }}"
                            name="{{ field.name }}"
                            id="{{ field.id_for_label }}"
                            placeholder="Enter {{ field.label }}"
                            {% if field.field.required %}required{% endif %}
                        >

                        <!-- Errors -->
                        {% for error in field.errors %}

                            <div class="errorlist">
                                {{ error }}
                            </div>

                        {% endfor %}

                    </div>

                {% endfor %}

                <!-- Register Button -->
                <button type="submit">
                    Register
                </button>

                <!-- Login Link -->
                <div class="login-link">

                    Already have an account?

                    <a href="{% url 'login' %}">
                        Login here
                    </a>

                </div>

            </form>

        </div>

    </div>

</body>
</html>
