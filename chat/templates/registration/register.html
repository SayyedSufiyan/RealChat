{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            width: 100%;
            min-height: 100%;
            overflow-x: hidden;
        }

        body {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #304ffe, #ff4081);
            padding: 20px 14px;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .main-wrapper {
            width: 100%;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-bottom: 80px;
        }

        .register-container {
            width: 100%;
            max-width: 720px;
            margin-top: 20px;
            margin-bottom: 60px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 24px;
            padding: 35px 30px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        .register-container h2 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 30px;
            font-weight: 600;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
        }

        .field-box {
            width: 100%;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="file"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 15px 16px;
            border: none;
            outline: none;
            border-radius: 14px;
            background: rgba(255,255,255,0.22);
            color: white;
            font-size: 16px;
        }

        input::placeholder,
        textarea::placeholder {
            color: #eeeeee;
        }

        input:focus,
        select:focus,
        textarea:focus {
            background: rgba(255,255,255,0.30);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
        }

        input[type="file"] {
            padding: 12px;
            cursor: pointer;
        }

        .errorlist {
            margin-top: 6px;
            color: #ffd4d4;
            font-size: 13px;
            list-style: none;
        }

        button {
            grid-column: 1 / -1;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: white;
            color: #304ffe;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        button:hover {
            background: #f2f2f2;
        }

        .login-link {
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 18px;
            font-size: 15px;
            line-height: 1.5;
        }

        .login-link a {
            color: white;
            font-weight: bold;
            text-decoration: underline;
        }

        @media screen and (max-width: 600px) {
            body {
                padding: 12px;
            }

            .main-wrapper {
                display: block;
                min-height: auto;
                padding-bottom: 100px;
            }

            .register-container {
                max-width: 100%;
                margin-top: 10px;
                margin-bottom: 80px;
                padding: 28px 18px;
                border-radius: 18px;
            }

            .register-container h2 {
                font-size: 1.8rem;
                margin-bottom: 25px;
            }

            form {
                grid-template-columns: 1fr;
                gap: 18px;
            }

            .full-width {
                grid-column: auto;
            }

            input[type="text"],
            input[type="password"],
            input[type="email"],
            input[type="file"],
            input[type="tel"],
            select,
            textarea {
                padding: 15px;
                font-size: 16px;
            }

            button {
                padding: 16px;
                font-size: 16px;
            }

            .login-link {
                font-size: 14px;
                padding-bottom: 25px;
            }
        }

        @media screen and (max-width: 360px) {
            body {
                padding: 8px;
            }

            .register-container {
                padding: 24px 14px;
            }

            .register-container h2 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

<body>

    <div class="main-wrapper">

        <div class="register-container">

            <h2>Register</h2>

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                {% for field in form %}

                    <div class="field-box {% if field.field.widget.input_type == 'file' %}full-width{% endif %}">

                        <label for="{{ field.id_for_label }}">
                            {{ field.label }}
                        </label>

                        {{ field }}

                        {% for error in field.errors %}
                            <div class="errorlist">
                                {{ error }}
                            </div>
                        {% endfor %}

                    </div>

                {% endfor %}

                <button type="submit">
                    Register
                </button>

                <div class="login-link">
                    Already have an account?
                    <a href="{% url 'login' %}">Login here</a>
                </div>

            </form>

        </div>

    </div>

</body>
</html>
